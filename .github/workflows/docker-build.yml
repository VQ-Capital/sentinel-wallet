# ========== DOSYA: sentinel-storage/.github/workflows/docker-build.yml ==========
name: Build and Push Storage Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive' # <-- Alt modülleri (.gitmodules) çeker
          
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and Push
        run: |
          # Repository ismini küçük harfe çevir
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' )
          docker build -t ghcr.io/${REPO_LOWER}:latest .
          docker push ghcr.io/${REPO_LOWER}:latest